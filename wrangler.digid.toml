# mupot-digid — digid tenant pot. NOT the template config (that's wrangler.toml).
# Deploy: CLOUDFLARE_API_TOKEN=$(cat ~/.sos/keys/cf-token-mupot-digid-deploy.token) \
#         CLOUDFLARE_ACCOUNT_ID=e39eaf94f33092c4efd029d94ae1e9dd \
#         NODE_OPTIONS=--dns-result-order=ipv4first wrangler deploy -c wrangler.digid.toml
# Tracked copy: mumega.com/agents/digid/mupot-digid.wrangler.toml (keep in sync).
name = "mupot-digid"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# branded address on digid's own zone (workers.dev URL stays as fallback)
routes = [
  { pattern = "agents.digid.ca", custom_domain = true }
]

[vars]
TENANT_SLUG = "digid"
BRAND = "Digid"
OAUTH_PROVIDER = "google"
# secrets deliberately NOT set (pre-live egress-gate requirement, dossier 2026-06-05):
# no OAUTH_*, GITHUB_TOKEN, AI_GATEWAY_TOKEN, channel tokens — pot is inbound-only.

[[d1_databases]]
binding = "DB"
database_name = "mupot-digid"
database_id = "744970f3-ed64-4897-9502-3cd5710b8f66"
migrations_dir = "migrations"

[[vectorize]]
binding = "VEC"
index_name = "mupot-digid-memory"

[[queues.producers]]
binding = "BUS"
queue = "mupot-digid-events"

[[queues.consumers]]
queue = "mupot-digid-events"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "mupot-digid-events-dlq"

[[kv_namespaces]]
binding = "SESSIONS"
id = "df4b54c9fc3d4a8bbbb0018810aef250"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "mupot-digid-blobs"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "AGENT"
class_name = "AgentDO"

[[durable_objects.bindings]]
name = "SQUAD"
class_name = "SquadCoordinatorDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentDO", "SquadCoordinatorDO"]

[[workflows]]
name = "mupot-digid-task-workflow"
binding = "TASK_WORKFLOW"
class_name = "TaskWorkflow"

[triggers]
crons = ["*/15 * * * *"]
