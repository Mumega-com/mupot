# mupot-house — the family-brand HQ pot (Digidinc side). NOT the template
# config (that's wrangler.toml). Pot per ENTITY, squad per BRAND: squads
# shabrang / kay-hermes / frc / hadi-media live INSIDE this one pot.
# Deploy: wrangler deploy -c wrangler.house.toml
# Tracked copy: mumega.com/agents/house/mupot-house.wrangler.toml (keep in sync).
name = "mupot-house"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TENANT_SLUG = "house"
BRAND = "Shabrang"
OAUTH_PROVIDER = "google"
# secrets deliberately NOT set (pre-live egress-gate, same policy as digid pot):
# no OAUTH_*, GITHUB_TOKEN, channel tokens — pot is inbound-only until live-flip.

[[d1_databases]]
binding = "DB"
database_name = "mupot-house"
database_id = "e8464d37-2b4e-4a7b-9b64-11f97873552d"
migrations_dir = "migrations"

[[vectorize]]
binding = "VEC"
index_name = "mupot-house-memory"

[[queues.producers]]
binding = "BUS"
queue = "mupot-house-events"

[[queues.consumers]]
queue = "mupot-house-events"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "mupot-house-events-dlq"

[[kv_namespaces]]
binding = "SESSIONS"
id = "c6cb99b5476b49de96c49e01b1143abd"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "mupot-house-blobs"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "AGENT"
class_name = "AgentDO"

[[durable_objects.bindings]]
name = "SQUAD"
class_name = "SquadCoordinatorDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentDO", "SquadCoordinatorDO"]

[triggers]
crons = ["*/15 * * * *"]
