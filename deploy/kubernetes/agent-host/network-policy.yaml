apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dme-hermes-agent-host
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mupot-agent-host
      app.kubernetes.io/instance: dme-hermes
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              mupot.network/zone: trusted-egress
          podSelector:
            matchLabels:
              mupot.network/role: trusted-egress
      ports:
        - protocol: TCP
          port: 443
