name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Fleet runtime tests
        run: node --test fleet-runtime/*.test.mjs
      - name: Wrangler dry-run bundle check
        run: npx wrangler deploy --dry-run --config wrangler.example.toml
      - name: D1 migration chain check
        run: |
          tmp_db="$(mktemp)"
          trap 'rm -f "$tmp_db"' EXIT
          for migration in migrations/*.sql; do
            sqlite3 "$tmp_db" < "$migration"
          done

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install plugin test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Compile plugin
        run: python -m compileall -q plugin
      - name: Plugin tests
        run: python -m pytest plugin/tests

  local-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Local browser and runtime evidence
        run: bash scripts/ci-local-evidence.sh
      - name: Upload local evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-evidence
          path: |
            tmp/local-evidence
            tmp/local-smoke
            tmp/local-runtime-conformance

  no-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard — no secrets in this public template
        run: |
          # fail if a real token-shaped string or a filled-in id leaked in
          if grep -rnE '(sk-[A-Za-z0-9_-]{20,})|(ghp_[A-Za-z0-9]{20,})|BEGIN (RSA|EC|OPENSSH) PRIVATE KEY' \
               --include='*.ts' --include='*.toml' --include='*.json' --include='*.sql' . ; then
            echo "::error::possible secret committed to the public template"; exit 1
          fi
          echo "no secrets found"
