# mupot — Cloudflare bindings TEMPLATE. For a new isolated pot, run
# `bash scripts/setup.sh --pot <yourpot>` to create resources, write
# wrangler.<yourpot>.toml, and apply migrations. The manual path may copy this template,
# create the resources, and replace the <YOUR_*> placeholders before deployment.
# This file is the BINDING CONTRACT every component builds against (see src/types.ts Env).
name = "mupot"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# ── tenant config (non-secret; secrets via `wrangler secret put`) ──
[vars]
TENANT_SLUG = "mumega"          # your org slug
# OWNER_TENANT_SLUG = "mumega"  # UNCOMMENT only on the operator's own pot deployment —
                                 # set to the SAME value as TENANT_SLUG above. Gates
                                 # env-level operator creds (e.g. POSTHOG_*) so they are
                                 # only ever used on behalf of the owning tenant, never a
                                 # customer/forked deployment (src/types.ts Env, #473).
BRAND = "Mumega"                   # dashboard brand
OAUTH_PROVIDER = "google"         # google | telegram
FLEET_PROJECT = "sos"             # pot fleet label (legacy name; CF-native messaging, not SOS Redis — ADR #473)
FLEET_OPS_AGENT = "kasra"         # ops agent that receives control asks via agent_messages (explicit — resolvers fail closed, no code default)
# secrets (NOT here): OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET, GITHUB_TOKEN, AI_GATEWAY_TOKEN.
# BUS_URL / BUS_TOKEN are SOS compat-shim leftovers — do NOT put them here; active fleet
# routes never call the Redis bus (docs/architecture/sos-coordination-compat.md).
# For a one-time self-hosted first owner without dashboard OAuth, set
# BOOTSTRAP_OWNER_TOKEN via `bash scripts/secrets.sh --pot <slug> --bootstrap-owner`,
# deploy, open /auth/bootstrap, then delete that secret. The route is unavailable
# whenever OAuth is configured; its singleton claim permits only the selected owner.
# OAuth 2.1 Google IdP secrets (deploy prerequisites — set before live-flip, Hadi approval required):
#   npx wrangler secret put GOOGLE_CLIENT_ID          # Google OAuth app client ID
#   npx wrangler secret put GOOGLE_CLIENT_SECRET      # Google OAuth app client secret
# Register redirect URIs in Google Cloud Console (TWO flows, two paths — register the one(s) you use):
#   DASHBOARD LOGIN (operators sign into the pot): https://mupot.mumega.com/auth/callback   ← the seam uses THIS
#   OAuth2.1 PROVIDER (MCP clients get tokens):     https://mupot.mumega.com/oauth/google-callback
# (src/auth/index.ts callbackUrl() = <origin>/auth/callback ; src/index.ts mounts /oauth/google-callback)

# ── memory: D1 (relational org + engram metadata) ──
[[d1_databases]]
binding = "DB"
database_name = "mupot"
database_id = "<YOUR_D1_DATABASE_ID>"
migrations_dir = "migrations"

# ── memory: Vectorize (semantic recall) ──
[[vectorize]]
binding = "VEC"
index_name = "mupot-memory"

# ── bus: Queues (async events / leads) ──
[[queues.producers]]
binding = "BUS"
queue = "mupot-events"

[[queues.consumers]]
queue = "mupot-events"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "mupot-events-dlq"

# ── sessions / config cache ──
[[kv_namespaces]]
binding = "SESSIONS"
id = "<YOUR_SESSIONS_KV_ID>"

# ── OAuth 2.1 state (clients, grants, tokens) ──
# Dedicated namespace so OAuth token lifecycle (TTL, rotation, revocation)
# is isolated from sessions. Used by @cloudflare/workers-oauth-provider.
# Deploy prerequisite (C8):
#   npx wrangler kv namespace create OAUTH_KV --account-id <YOUR_CF_ACCOUNT_ID>
#   then replace the id placeholder below with the output namespace id.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "<YOUR_OAUTH_KV_ID>"

# ── blobs ──
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "mupot-blobs"

# ── Workers AI (embeddings + cheap inference) ──
[ai]
binding = "AI"

# ── agent runtime: one Durable Object per agent; one per squad ──
[[durable_objects.bindings]]
name = "AGENT"
class_name = "AgentDO"

[[durable_objects.bindings]]
name = "SQUAD"
class_name = "SquadCoordinatorDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentDO", "SquadCoordinatorDO"]

# ── durable task pipeline (issue #7) ──
# Opt-in: start via POST /api/tasks/:id/pipeline.  The legacy direct-execute
# path (runTaskExecution) is unaffected.  step.waitForEvent pauses the instance
# at zero idle cost until the verdict endpoint resumes it.
[[workflows]]
name = "mupot-task-workflow"
binding = "TASK_WORKFLOW"
class_name = "TaskWorkflow"

# membership sync: reconcile channel membership → squad capabilities every 15 min
[triggers]
crons = ["*/15 * * * *"]

# ── GHL act-channel secrets (issue #8) ──
# These are secrets — do NOT add them under [vars]. Set via wrangler secret put:
#
#   npx wrangler secret put GHL_API_KEY          # GHL location API key (outbound sends)
#   npx wrangler secret put GHL_LOCATION_ID      # GHL location id (scopes all API calls)
#   npx wrangler secret put GHL_WEBHOOK_SECRET   # HMAC-SHA256 secret for inbound webhook
#
# Optional var (non-secret; may go in [vars]):
#   GHL_INBOUND_SQUAD_ID = "<squad-uuid>"  # route inbound webhooks to this squad
#                                           # (falls back to the pot's first squad if unset)
#
# Until these secrets are set the GHL channel is inert (fails closed):
#   - Outbound sends return { ok: false, reason: 'not_configured' }
#   - Inbound webhook returns 503 { error: 'not_configured' }
